name: Update fuel prices

on:
  schedule:
    - cron: "35 22 * * *"   # 매일 07:35 KST (22:35 UTC)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Fetch Opinet prices
        env:
          OPINET_API_KEY: ${{ secrets.OPINET_API_KEY }}
        run: node update-fuel-prices.js
      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add fuel-prices.json
          git diff --staged --quiet || git commit -m "Update fuel prices (auto)"
          git push
