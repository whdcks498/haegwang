/* ── 데이터 로드: episodes.json(최신) → 실패시 내장본. + 로컬 추가분 병합 ── */
async function loadData(){
  try{
    const r = await fetch('episodes.json', {cache:'no-store'});
    if(r.ok){ const j = await r.json(); if(j && j.series) DATA = j; }
  }catch(e){ /* 로컬(file://) 등에서는 내장본 사용 */ }
  mergeLocalExtras();
}
function mergeLocalExtras(){
  let extra; try{ extra = JSON.parse(localStorage.getItem(LS_KEY)||'[]'); }catch(e){ extra=[]; }
  if(!Array.isArray(extra)) return;
  extra.forEach(function(ep){
    const s = DATA.series.find(x=>x.id===ep.seriesId);
    if(!s) return;
    if(s.episodes.some(e=>e.no===ep.no)) return; // 중복 방지
    s.episodes.push({no:ep.no,title:ep.title,date:ep.date,likes:ep.likes||0,thumb:ep.thumb||'',panels:ep.panels||[]});
  });
}

/* ── 유틸 ── */
function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function fmtDate(d){ return (d||'').replace(/-/g,'.'); }
function getSeries(id){ return DATA.series.find(s=>s.id===id); }
function getEp(sid,no){ const s=getSeries(sid); return s?s.episodes.find(e=>e.no===Number(no)):null; }
function sortedEps(s,asc){ const a=s.episodes.slice().sort((x,y)=>x.no-y.no); return asc?a:a.reverse(); }
async function sha256Hex(str){ const b=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(str)); return Array.from(new Uint8Array(b)).map(x=>x.toString(16).padStart(2,'0')).join(''); }
function backendJsonp(params){
  return new Promise(function(resolve,reject){
    var cb='__ht'+Date.now()+Math.floor(Math.random()*10000);
    var s=document.createElement('script');
    var q=Object.keys(params).map(k=>encodeURIComponent(k)+'='+encodeURIComponent(params[k])).join('&');
    window[cb]=function(d){ resolve(d); try{delete window[cb];}catch(e){} s.remove(); };
    s.onerror=function(){ try{delete window[cb];}catch(e){} s.remove(); reject(new Error('net')); };
    s.src=SHEET_WEBAPP_URL+'?'+q+'&callback='+cb;
    document.body.appendChild(s);
    setTimeout(function(){ if(window[cb]){ try{delete window[cb];}catch(e){} s.remove(); reject(new Error('timeout')); } },12000);
  });
}

  if(h==='admin'){
    if(isAdmin){ app.innerHTML = viewAdminPanel(); editPanels=[{caption:'',img:'',svg:''}]; renderPanelEditors(); }
    else { app.innerHTML = viewAdminLock(); }
    return;

  app.innerHTML = viewHome();
}

function viewViewer(sid,no){
  const s=getSeries(sid), e=getEp(sid,no);
  if(!e) return `<div class="wrap"><p>회차를 찾을 수 없습니다.</p><a class="back" href="#series/${sid}">← 회차 목록</a></div>`;
  const eps=sortedEps(s,true);
  const idx=eps.findIndex(x=>x.no===e.no);
  const prev=idx>0?eps[idx-1]:null, next=idx<eps.length-1?eps[idx+1]:null;
  const nav=`<div class="vnav">
      <button class="prev" ${prev?'':'disabled'} onclick="${prev?`location.hash='#viewer/${sid}/${prev.no}'`:''}">‹ 이전화</button>
      <a class="list" href="#series/${sid}">목록</a>
      <button class="next" ${next?'':'disabled'} onclick="${next?`location.hash='#viewer/${sid}/${next.no}'`:''}">다음화 ›</button>
    </div>`;
  const panels=e.panels.map(function(p){
    const media = p.svg ? p.svg : (p.img ? `<img src="${esc(p.img)}" alt="해광툰 ${esc(s.title)} ${e.no}화">` : '');
    return `<div class="panel">${media}${p.caption?`<div class="cap">${esc(p.caption)}</div>`:''}</div>`;
  }).join('');
  const liked = getLiked(sid,e.no);
  return `<div class="wrap" style="padding-top:18px">
    <a class="back" href="#series/${sid}">← ${esc(s.title)} 회차 목록</a>
    <div class="vhead"><span class="vn">${e.no}화</span><h2>${esc(e.title)}</h2><div class="vd">📅 ${fmtDate(e.date)} · 해광툰</div></div>
    ${nav}
    <div class="strip">
      ${panels}
      <div class="vlike"><button id="likeBtn" class="${liked?'liked':''}">❤️ 좋아요 <span id="likeCnt">${(e.likes||0)+(liked?0:0)}</span></button></div>
      <div class="vend">
        <h3>당신도 새벽을 달리는 사람이 될 수 있어요</h3>
        <p>전국 화물기사 모집 · 1톤~25톤 · 25~70세 · 초보·고령 환영</p>
        <div class="btns">
          <a class="btn b-call" href="tel:01072333916">📞 010-7233-3916</a>
          <a class="btn b-site" href="index.html#jobs">채용공고 보러가기 →</a>
        </div>
      </div>
    </div>
    ${nav}
  </div>`;
}
function getLikedMap(){ try{ return JSON.parse(localStorage.getItem(LIKE_KEY)||'{}'); }catch(e){ return {}; } }
function getLiked(sid,no){ return !!getLikedMap()[sid+'_'+no]; }
function bindLike(sid,no){
  const btn=document.getElementById('likeBtn'); if(!btn) return;
  const e=getEp(sid,no); const cntEl=document.getElementById('likeCnt');
  btn.onclick=function(){
    const map=getLikedMap(); const k=sid+'_'+no; const now=!map[k];
    map[k]=now; localStorage.setItem(LIKE_KEY,JSON.stringify(map));
    btn.classList.toggle('liked',now);
    cntEl.textContent=(e.likes||0)+(now?1:0);
  };
  // 초기 표시 보정
  cntEl.textContent=(e.likes||0)+(getLiked(sid,no)?1:0);
}

  return `<div class="wrap"><a class="back" href="#home">← 작품 목록</a>
    <div class="admin-lock">
      <div class="alh"><div class="t">🔐 해광툰 관리자 전용</div><div class="s">만화 업로드는 마스터 관리자만 가능합니다</div></div>
      <div class="alb">
        <label>관리자 아이디</label>
        <input class="fld" id="aId" placeholder="관리자 아이디" autocomplete="off">
        <label>관리자 비밀번호</label>
        <input class="fld" id="aPw" type="password" placeholder="관리자 비밀번호" onkeydown="if(event.key==='Enter')doAdminLogin()">
        <button class="btn-red" onclick="doAdminLogin()">🔐 관리자 접속</button>
        <div class="err" id="aErr">아이디 또는 비밀번호가 올바르지 않습니다.</div>
        <div class="hintbox">기존 화물구인구직 사이트 <b>관리자 계정과 동일</b>합니다. 서버(Apps Script)에서 검증하므로 정확한 계정만 접속됩니다.</div>
      </div>
    </div></div>`;
}
async function doAdminLogin(){
  const id=document.getElementById('aId').value.trim();
  const pw=document.getElementById('aPw').value;
  const err=document.getElementById('aErr');
  if(!id||!pw){ err.style.display='block'; return; }
  let res;
  try{ const h=await sha256Hex(pw); res=await backendJsonp({action:'adminlogin',id:id,h:h}); if(res&&res.ok)res._h=h; }
  catch(e){ err.textContent='서버 연결 실패. 잠시 후 다시 시도해 주세요.'; err.style.display='block'; return; }
  if(res&&res.ok&&id===ADMIN_ID){
    isAdmin=true; adminKey=res._h; err.style.display='none';
    document.getElementById('app').innerHTML=viewAdminPanel();
    editPanels=[{caption:'',img:'',svg:''}]; renderPanelEditors();
  }else{
    err.textContent='아이디 또는 비밀번호가 올바르지 않습니다.';
    err.style.display='block';
    document.getElementById('aPw').value='';
  }
}
function adminLogout(){ isAdmin=false; adminKey=null; location.hash='#home'; }

let editPanels = [{caption:'',img:'',svg:''}];
function viewAdminPanel(){
  const seriesOpts=DATA.series.map(s=>`<option value="${s.id}">${esc(s.title)}</option>`).join('');
  const defSeries=DATA.series[0];
  const nextNo=defSeries?Math.max.apply(null,defSeries.episodes.map(e=>e.no)).valueOf()+1:1;
  return `<div class="adminbar">
      <div class="l"><span class="pill">🔐 관리자 모드</span><span>박종찬 마스터 관리자</span></div>
      <button onclick="adminLogout()">🚪 로그아웃</button>
    </div>
    <div class="wrap">
      <a class="back" href="#home">← 작품 목록</a>
      <div class="sec-h">🎨 해광툰 만화 업로드</div>

      <div class="apanel">
        <h3>① 회차 기본 정보</h3>
        <div class="arow">
          <div><label>작품(시리즈)</label><select class="fld" id="upSeries">${seriesOpts}</select></div>
          <div><label>화수(번호)</label><input class="fld" id="upNo" type="number" value="${nextNo}" min="1"></div>
          <div><label>연재일</label><input class="fld" id="upDate" type="date" value="${DATA.updated||''}"></div>
        </div>
        <label>회차 제목</label>
        <input class="fld" id="upTitle" placeholder="예: 첫 배차의 떨림">
        <label>썸네일 이미지 URL <span style="color:#999;font-weight:400">(선택 · 비우면 자동 생성)</span></label>
        <input class="fld" id="upThumb" placeholder="https://... 또는 비워두기">
      </div>

      <div class="apanel">
        <h3>② 컷(패널) 구성</h3>
        <div id="panelList"></div>
        <button class="btn-add" onclick="addPanel()">＋ 컷 추가</button>
      </div>

      <div class="apanel">
        <h3>③ 미리보기 · 저장</h3>
        <div style="display:flex;gap:10px;flex-wrap:wrap">
          <button class="btn-navy" onclick="previewEpisode()">👁️ 미리보기(이 브라우저)</button>
          <button class="btn-gold" onclick="exportJson()">⬇️ episodes.json 내보내기</button>
        </div>
        <div class="hintbox">
          <b>정적 사이트 안내</b> — 이 페이지는 GitHub Pages(정적 호스팅)라 서버 저장이 없습니다.<br>
          ① <b>미리보기</b>: 이 브라우저에만 즉시 반영(localStorage)되어 결과를 바로 확인할 수 있습니다.<br>
          ② <b>실제 배포</b>: <b>episodes.json 내보내기</b>로 파일을 받은 뒤,
          <b>github.com/whdcks498/haegwang/upload/main</b> 에 그 <b>episodes.json</b>을 업로드(덮어쓰기)하면 1~2분 후 모든 사람에게 반영됩니다.<br>
          (이미지를 쓰려면 이미지도 같은 저장소에 올리고 그 URL을 컷의 이미지 URL에 넣으세요.)
        </div>
        <div id="upMsg" style="margin-top:12px"></div>
      </div>
    </div>`;
}
function renderPanelEditors(){
  const box=document.getElementById('panelList'); if(!box) return;
  box.innerHTML=editPanels.map(function(p,i){
    return `<div class="panel-edit">
      <div class="ph"><b>컷 ${i+1}</b>${editPanels.length>1?`<button onclick="removePanel(${i})">삭제</button>`:''}</div>
      <label>설명(대사/내레이션)</label>
      <input class="fld" data-i="${i}" data-f="caption" value="${esc(p.caption)}" placeholder="예: 📍 컷1. 첫 배차, 손이 다 떨린다.">
      <label>이미지 URL <span style="color:#999;font-weight:400">(SVG를 넣지 않을 때)</span></label>
      <input class="fld" data-i="${i}" data-f="img" value="${esc(p.img)}" placeholder="https://...">
      <label>또는 SVG 코드 직접 붙여넣기 <span style="color:#999;font-weight:400">(선택)</span></label>
      <textarea class="fld" data-i="${i}" data-f="svg" rows="2" placeholder="<svg ...>...</svg>">${esc(p.svg)}</textarea>
    </div>`;
  }).join('');
  box.querySelectorAll('[data-i]').forEach(function(el){
    el.addEventListener('input',function(){ editPanels[+el.dataset.i][el.dataset.f]=el.value; });
  });
}
function addPanel(){ syncPanels(); editPanels.push({caption:'',img:'',svg:''}); renderPanelEditors(); }
function removePanel(i){ syncPanels(); editPanels.splice(i,1); if(!editPanels.length)editPanels=[{caption:'',img:'',svg:''}]; renderPanelEditors(); }
function syncPanels(){
  document.querySelectorAll('#panelList [data-i]').forEach(function(el){ editPanels[+el.dataset.i][el.dataset.f]=el.value; });
}
function collectEpisode(){
  syncPanels();
  const sid=document.getElementById('upSeries').value;
  const no=Number(document.getElementById('upNo').value);
  const title=document.getElementById('upTitle').value.trim();
  const date=document.getElementById('upDate').value;
  const thumb=document.getElementById('upThumb').value.trim();
  if(!title){ alert('회차 제목을 입력해 주세요.'); return null; }
  if(!no||no<1){ alert('화수(번호)를 확인해 주세요.'); return null; }
  const panels=editPanels.filter(p=>p.caption||p.img||p.svg).map(function(p){
    const o={caption:p.caption};
    if(p.svg && p.svg.trim().indexOf('<svg')===0) o.svg=p.svg.trim();
    else if(p.img) o.img=p.img.trim();
    return o;
  });
  if(!panels.length){ alert('컷을 최소 1개 이상 입력해 주세요(설명/이미지/SVG).'); return null; }
  const thumbSvg = thumb ? '' : autoThumb(no,title);
  return {seriesId:sid, no:no, title:title, date:date, likes:0,
          thumb: thumb ? `<img src="${esc(thumb)}" alt="${esc(title)}">` : thumbSvg, panels:panels};
}
function autoThumb(no,title){
  return "<svg viewBox='0 0 160 160' xmlns='http://www.w3.org/2000/svg'><rect width='160' height='160' fill='#14213d'/><rect y='110' width='160' height='50' fill='#1a3a8a'/><polygon points='40,160 60,110 80,110 100,160' fill='#3a3a45'/><rect x='66' y='110' width='8' height='50' fill='#ffe27a'/><text x='80' y='50' font-size='34' fill='#ffd700' font-weight='bold' text-anchor='middle' font-family='sans-serif'>"+no+"화</text></svg>";
}
function previewEpisode(){
  const ep=collectEpisode(); if(!ep) return;
  let extra; try{ extra=JSON.parse(localStorage.getItem(LS_KEY)||'[]'); }catch(e){ extra=[]; }
  extra=extra.filter(x=>!(x.seriesId===ep.seriesId&&x.no===ep.no));
  extra.push(ep);
  localStorage.setItem(LS_KEY,JSON.stringify(extra));
  DATA=JSON.parse(JSON.stringify(DEFAULT_DATA)); mergeLocalExtras();
  const m=document.getElementById('upMsg');
  m.innerHTML=`<div style="background:#e8f6ec;border:1px solid #9fd9b0;color:#1a7a3a;border-radius:9px;padding:12px;font-weight:700">
    ✅ 이 브라우저에 미리 반영했습니다. <a href="#viewer/${ep.seriesId}/${ep.no}" style="color:#0a5a28;text-decoration:underline">${ep.no}화 뷰어로 이동 →</a><br>
    <span style="font-weight:400;font-size:12.5px;color:#3a6a4a">모두에게 보이게 하려면 아래 'episodes.json 내보내기' 후 GitHub에 업로드하세요.</span></div>`;
}
function exportJson(){
  const ep=collectEpisode(); if(!ep) return;
  // 현재 배포본(episodes.json/내장본) 기준으로 병합
  const out=JSON.parse(JSON.stringify(DATA));
  // 미리보기로 들어온 로컬분이 DATA에 이미 있을 수 있으니, 이번 ep을 정식 반영
  const s=out.series.find(x=>x.id===ep.seriesId);
  if(s){
    const i=s.episodes.findIndex(e=>e.no===ep.no);
    const rec={no:ep.no,title:ep.title,date:ep.date,likes:ep.likes||0,thumb:ep.thumb,panels:ep.panels};
    if(i>=0) s.episodes[i]=rec; else s.episodes.push(rec);
    s.episodes.sort((a,b)=>a.no-b.no);
  }
  out.updated=ep.date||out.updated;
  const blob=new Blob([JSON.stringify(out,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a'); a.href=url; a.download='episodes.json'; document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(url),1000);
  const m=document.getElementById('upMsg');
  m.innerHTML=`<div style="background:#fff7e0;border:1px solid #ffd87a;color:#7a5b00;border-radius:9px;padding:12px;font-weight:700">
    ⬇️ episodes.json 파일을 받았습니다.<br>
    <span style="font-weight:400;font-size:12.5px">이제 <b>github.com/whdcks498/haegwang/upload/main</b> 에서 이 파일을 업로드(덮어쓰기) → 커밋하면 1~2분 후 사이트에 반영됩니다.</span></div>`;
}

/* ── 시작 ── */
window.addEventListener('hashchange',router);
(async function(){ await loadData(); router(); })();
</script>
